# DABI Redis 8.6 configuration
# Note: most settings are passed via command-line in docker-compose.yml
# This file exists for any additional tuning beyond the command line.

# Network
bind 0.0.0.0
protected-mode yes
port 6379

# Security note: no auth — Redis is only reachable within dabi-net docker network,
# never exposed to the host or external. If exposing in future, set `requirepass`.

# Performance
tcp-keepalive 60
timeout 0

# Persistence (AOF every second, RDB hourly via BGSAVE in backup.sh)
appendonly yes
appendfsync everysec
appendfilename "appendonly.aof"
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

save 3600 1
save 300 100
save 60 10000

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Memory (set via command-line in compose; mirrored here)
maxmemory 4gb
maxmemory-policy allkeys-lru
