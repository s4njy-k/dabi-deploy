# DABI nginx 1.30 reverse-proxy + SPA static server

upstream dabi_api {
    server api:8000;
    keepalive 32;
}

# HTTP — redirect to HTTPS (after certbot has issued)
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/dabi/current;
    }

    location /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main site
server {
    listen 443 ssl http2;
    server_name _;

    # certbot manages these; init paths exist after Phase 9
    ssl_certificate     /etc/letsencrypt/live/_default_/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/_default_/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # SPA static files (web image emits to /var/www/dabi/current/dist/)
    root /var/www/dabi/current/dist;
    index index.html;

    # API reverse-proxy
    location /api/ {
        proxy_pass         http://dabi_api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache-control split (v0.7.6 nctau fix carried forward)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location ~* \.(js|css|woff2|svg|png|jpg|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
