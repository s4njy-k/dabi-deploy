# DABI nginx 1.30 reverse-proxy + SPA static server

upstream dabi_api {
    server api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/dabi/current; }
    location /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/_default_/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/_default_/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    http2 on;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/dabi/current/dist;
    index index.html;

    location /api/ {
        include /etc/nginx/conf.d/security-headers.conf;
        proxy_pass         http://dabi_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    location = /healthz {
        include /etc/nginx/conf.d/security-headers.conf;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(js|css|woff2|svg|png|jpg|webp)$ {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
