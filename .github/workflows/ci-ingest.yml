name: Build & Push ingest image

on:
  push:
    branches: [main]
    paths:
      - "ingest/**"
      - ".github/workflows/ci-ingest.yml"
  pull_request:
    paths:
      - "ingest/**"
      - ".github/workflows/ci-ingest.yml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install ruff
      - run: ruff check ingest/
      - run: ruff format --check ingest/

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install -r ingest/requirements.txt pytest
      - name: pytest
        working-directory: ingest
        run: python -m pytest tests/ -v

  build-and-push:
    name: Build & push (linux/arm64)
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: >-
            projects/196220383964/locations/global/workloadIdentityPools/dabi-ci/providers/github
          service_account: sa-dabi-ci@dabi-prod-01.iam.gserviceaccount.com

      - uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - uses: docker/build-push-action@v6
        with:
          context: ./ingest
          platforms: linux/arm64
          push: true
          tags: asia-south1-docker.pkg.dev/dabi-prod-01/dabi/ingest:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
