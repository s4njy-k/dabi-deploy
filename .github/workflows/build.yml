# Build the dabi-ingest ARM64 image, vuln-scan, push to Artifact Registry.
# Auth: Workload Identity Federation (no SA JSON keys ever).
# Bumps INGEST_SHA in docker-compose.yml via a follow-up commit on a PR.
name: build

on:
  push:
    branches: [main]
    paths:
      - "ingest/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    paths:
      - "ingest/**"

permissions:
  id-token: write
  contents: read

env:
  PROJECT: dabi-prod-01
  REGION: asia-south1
  REPO: dabi
  IMAGE: ingest

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: sa-dabi-ci@dabi-prod-01.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to AR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up QEMU (ARM64 emulation on amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ingest (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./ingest
          file: ./ingest/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ steps.vars.outputs.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.REPO }}/${{ env.IMAGE }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
